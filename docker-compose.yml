services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledgerloop
      POSTGRES_PASSWORD: ledgerloop
      POSTGRES_DB: ledgerloop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerloop"]
      interval: 2s
      timeout: 2s
      retries: 15

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      # dual listeners: compose services use redpanda:9092, the host uses localhost:19092
      - --kafka-addr=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr=INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    command: uvicorn ledgerloop.api.app:app --host 0.0.0.0 --port 8000
    environment: &app_env
      DATABASE_URL: postgresql://ledgerloop:ledgerloop@postgres:5432/ledgerloop
      KAFKA_BOOTSTRAP: redpanda:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      LEDGERLOOP_WORKFLOWS: ledgerloop.domain.contracts.workflow
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  worker-1:
    build: .
    command: python -m ledgerloop.engine.worker
    environment:
      <<: *app_env
      WORKER_ID: worker-1
    depends_on:
      postgres:
        condition: service_healthy

  worker-2:
    build: .
    command: python -m ledgerloop.engine.worker
    environment:
      <<: *app_env
      WORKER_ID: worker-2
    depends_on:
      postgres:
        condition: service_healthy

  ingress:
    build: .
    command: python -m ledgerloop.kafka.ingress
    environment: *app_env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  egress:
    build: .
    command: python -m ledgerloop.kafka.egress
    environment: *app_env
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
